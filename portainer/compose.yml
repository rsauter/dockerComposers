services:

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer-data:/data
    ports:
      - "9000:9000"   # HTTP UI
      - "9443:9443"   # HTTPS UI
      - "8000:8000"   # Edge Agent Tunnel (optional, kann weggelassen werden)

volumes:
  portainer-data: